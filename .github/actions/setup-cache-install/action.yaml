name: "Setup Node and cache"
description: "Setup Node.js with latest version and cache npm dependencies"
runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: 'npm'

    - name: Install dependencies
      run: npm ci
      shell: bash
