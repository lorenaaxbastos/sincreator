name: QA Pipeline

on:
  pull_request:
    branches: [qa]
  push:
    branches: [qa]

jobs:
  validate-and-build:
    name: Validate and build artifact
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Setup Node.js and cache dependencies
        uses: ./.github/actions/setup-cache-install

      - name: Quality (format, lint, tests)
        uses: ./.github/actions/format-lint-tests

      - name: Build app
        run: npm run build -w sincreator-frontend

      - name: Upload build artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  deploy-test:
    name: Deploy to test environment
    needs: validate-and-build
    if: github.event_name == 'push'
    uses: ./.github/workflows/docker-deploy.yaml
    with:
      environment: test
      use_artifact: true
      image_tag: qa-${{ github.sha }}
    secrets: inherit
